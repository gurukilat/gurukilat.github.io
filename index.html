<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  background: #020617;
}

.nav input {
  padding: 8px;
  border-radius: 6px;
  border: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

/* FILTER */
.filters {
  text-align: center;
  margin: 20px;
}

.filters button {
  margin: 5px;
  padding: 8px 14px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  background: #ff6600;
}

/* TAG */
.tag {
  font-size: 12px;
  opacity: 0.7;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-content {
  background: #111;
  margin: 10% auto;
  padding: 25px;
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  background: #ff6600;
  padding: 10px 20px;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}
</style>

<script>
let currentFilter = "all";

function filterTools(category) {
  currentFilter = category;
  displayTools();
}

function searchTools() {
  displayTools();
}

function displayTools() {
  let search = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.dataset.name.toLowerCase();
    let cat = card.dataset.category;

    if ((currentFilter === "all" || cat === currentFilter) && name.includes(search)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

function openModal(id){
  document.getElementById(id).style.display = "block";
}

function closeModal(id){
  document.getElementById(id).style.display = "none";
}
</script>

</head>

<body>

<div class="nav">
  <div><b>AI Tools Hub</b></div>
  <input id="search" onkeyup="searchTools()" placeholder="Search AI tools...">
</div>

<div class="hero">
  <h1>Top AI Tools 2026 🚀</h1>
  <p>Cari, belajar & guna AI tools terbaik</p>
</div>

<div class="filters">
  <button onclick="filterTools('all')">All</button>
  <button onclick="filterTools('writing')">Writing</button>
  <button onclick="filterTools('design')">Design</button>
  <button onclick="filterTools('video')">Video</button>
  <button onclick="filterTools('productivity')">Productivity</button>
</div>

<div class="grid">

  <div class="card" data-name="ChatGPT" data-category="writing" onclick="openModal('chatgpt')">
    ChatGPT<br><span class="tag">Writing</span>
  </div>

  <div class="card" data-name="Canva AI" data-category="design" onclick="openModal('canva')">
    Canva AI<br><span class="tag">Design</span>
  </div>

  <div class="card" data-name="Grammarly" data-category="writing" onclick="openModal('grammarly')">
    Grammarly<br><span class="tag">Writing</span>
  </div>

  <div class="card" data-name="Runway ML" data-category="video" onclick="openModal('runway')">
    Runway ML<br><span class="tag">Video</span>
  </div>

  <div class="card" data-name="Notion AI" data-category="productivity" onclick="openModal('notion')">
    Notion AI<br><span class="tag">Productivity</span>
  </div>

</div>

<!-- MODAL EXAMPLE -->
<div id="chatgpt" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('chatgpt')">X</span>
    <h2>ChatGPT</h2>
    <p>AI chatbot untuk bantu kerja, idea & content.</p>
    <a class="btn" href="https://chat.openai.com">Try Now</a>
  </div>
</div>

<div id="canva" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('canva')">X</span>
    <h2>Canva AI</h2>
    <p>Design content dengan AI.</p>
    <a class="btn" href="https://canva.com">Try Now</a>
  </div>
</div>

</body>
</html>
